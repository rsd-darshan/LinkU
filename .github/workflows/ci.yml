name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma
        run: npx prisma validate && npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        env:
          # Empty Clerk keys keep auth providers disabled in CI build checks.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""
          CLERK_SECRET_KEY: ""
          DATABASE_URL: postgresql://linku:linku@127.0.0.1:5433/linku
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          STRIPE_SECRET_KEY: ""
          STRIPE_WEBHOOK_SECRET: ""
        run: npm run build
